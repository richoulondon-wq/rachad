<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Random Video Chat</title>
<link rel="stylesheet" href="style.css">
<style>
  body{font-family:sans-serif;margin:0;padding:0;background:#f0f0f0;}
  header{background:#222;color:#fff;padding:10px;text-align:center;}
  #app{display:none;padding:10px;}
  #videos{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
  video{width:300px;height:225px;background:#000;}
  button{margin:2px;padding:5px 10px;}
  #messages{height:150px;overflow-y:auto;border:1px solid #ccc;padding:5px;margin-bottom:5px;background:#fff;}
  #chatInput{display:flex;gap:5px;}
</style>
</head>
<body>

<header>?? Global Random Video Chat</header>

<div id="login">
  <div id="loginBox">
    <h3>Join Chat</h3>
    <input id="username" placeholder="Your name">
    <select id="country">
      <option value="">Select Country</option>
      <option>Algeria</option>
      <option>France</option>
      <option>USA</option>
      <option>Morocco</option>
      <option>Tunisia</option>
    </select>
    <select id="gender">
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
    <button onclick="join()">Enter Chat</button>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div id="userInfo"></div>
    <div>
      <button onclick="findUser()">?? Find</button>
      <button onclick="nextUser()">? Next</button>
    </div>
  </div>

  <div id="main">
    <div id="videos">
      <div>
        <h4>You</h4>
        <video id="localVideo" autoplay playsinline muted></video>
        <br>
        <button onclick="toggleCamera()">?? Camera On/Off</button>
        <button onclick="toggleMic()">?? Mic On/Off</button>
      </div>
      <div>
        <h4>Stranger</h4>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>

    <div id="chat">
      <div id="messages"></div>
      <div id="chatInput">
        <input id="msg" placeholder="Type a message">
        <button onclick="sendMessage()">Send</button>
        <input type="file" id="img" onchange="sendImage()">
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let peer;
let localStream;
let cameraOn = true;
let micOn = true;

function join() {
  const name = username.value;
  const countryValue = country.value;
  const genderValue = gender.value;
  if(!name) return;

  socket.emit("join",{name,country:countryValue,gender:genderValue});
  login.style.display="none";
  app.style.display="block";
  userInfo.innerText = `${name} | ${countryValue} | ${genderValue}`;
}

navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
  localStream = stream;
  localVideo.srcObject = stream;
});

function createPeer(){
  peer = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  localStream.getTracks().forEach(track=>peer.addTrack(track,localStream));
  peer.ontrack = e=> remoteVideo.srcObject = e.streams[0];
  peer.onicecandidate = e=>{
    if(e.candidate) socket.emit("ice",e.candidate);
  };
}

function findUser(){
  socket.emit("find");
  messages.innerHTML += "<p>Searching for a partner...</p>";
}

function nextUser(){
    if(peer){ peer.close(); peer=null; }
    remoteVideo.srcObject = null;
    messages.innerHTML = "";
    socket.emit("next");  // ????? ???? ??????? ????? ?? ???? ????
}
function sendMessage(){
  let text = msg.value;
  if(!text) return;
  messages.innerHTML += "<p><b>You:</b> "+text+"</p>";
  socket.emit("message",text);
  msg.value="";
}

function sendImage(){
  const file = img.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    messages.innerHTML += "<p><b>You:</b><br><img src='"+reader.result+"'></p>";
    socket.emit("image",reader.result);
  };
  reader.readAsDataURL(file);
}

// Socket Events
socket.on("matched", async ()=>{
  createPeer();
  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);
  socket.emit("offer",offer);
});

socket.on("offer", async offer=>{
  createPeer();
  await peer.setRemoteDescription(offer);
  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);
  socket.emit("answer",answer);
});

socket.on("answer", async answer=>{
  await peer.setRemoteDescription(answer);
});

socket.on("ice", async candidate=>{
  try{ await peer.addIceCandidate(candidate); }catch(e){}
});

socket.on("message", text=>{ messages.innerHTML += "<p><b>Stranger:</b> "+text+"</p>"; });
socket.on("image", data=>{ messages.innerHTML += "<p><b>Stranger:</b><br><img src='"+data+"'></p>"; });
socket.on("partner-left", ()=>{ messages.innerHTML += "<p>Your partner left. Searching for a new partner...</p>"; nextUser(); });
socket.on("status", txt=>{ messages.innerHTML += `<p>${txt}</p>`; });

function toggleCamera(){
  if(!localStream) return;
  const videoTrack = localStream.getVideoTracks()[0];
  videoTrack.enabled = !cameraOn;
  cameraOn = !cameraOn;
}
function toggleMic(){
  if(!localStream) return;
  const audioTrack = localStream.getAudioTracks()[0];
  audioTrack.enabled = !micOn;
  micOn = !micOn;
}
</script>

</body>
</html>
